<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjeta</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="flex-container">
  <main class="card">
    <header class="header">
      <div class="foto-perfil">
        <img src="assets/imagen.jpg" alt="Foto perfil" style="width: 100px; height: 100px; border-radius: 50%" />
      </div>
      <div class="info">
        <p class="nombre">Pablo Picasso</p>
        <p class="titulo">Desarrollador de Software</p>
      </div>
    </header>

    <section>
      <div>
        <p>Dia</p>
        <p id="current-day"></p>
      </div>
      <div>
        <p>Mes</p>
        <p id="current-month"></p>
      </div>
      <div>
        <p>Año</p>
        <p id="current-year"></p>
      </div>
    </section>

    <footer>
      <button class="button1">Google</button>
      <button class="button2">Youtube</button>
    </footer>
  </main>
  
  <script>
    // Creamos un objeto de fecha con el momento actual
    const fechaActual = new Date();

    // Obtenemos los valores individuales
    const dia = fechaActual.getDate();
    const mes = fechaActual.getMonth() + 1; // Los meses van de 0 a 11, por eso sumamos 1
    const anio = fechaActual.getFullYear();

    // Inyectamos los valores en los párrafos usando su ID
    document.getElementById('current-day').textContent = dia;
    document.getElementById('current-month').textContent = mes;
    document.getElementById('current-year').textContent = anio;
  </script>
</body>

</html>
