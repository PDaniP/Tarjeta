<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarjeta</title>

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="flex-container">
    <main class="card">
      <button class="mode">Modo Oscuro</button>

      <header class="header">
        <div class="foto-perfil">
          <img src="assets/imagen.jpg" alt="Foto perfil" />
        </div>
        <div class="info">
          <p class="nombre">Pablo Picasso</p>
          <p class="titulo">Desarrollador de Software</p>
        </div>
      </header>

      <button class="datos">Modificar datos</button>

      <section>
        <div>
          <p>Dia</p>
          <p id="current-day"></p>
        </div>
        <div>
          <p>Mes</p>
          <p id="current-month"></p>
        </div>
        <div>
          <p>Año</p>
          <p id="current-year"></p>
        </div>
      </section>

      <footer>
        <a href="https://www.google.com" target="_blank"
          ><button class="button1">Google</button></a
        >
        <a href="https://www.youtube.com" target="_blank"
          ><button class="button2">Youtube</button></a
        >
      </footer>

      <div class="color-buttons">
        <button class="color-btn red" data-color="red">Rojo</button>
        <button class="color-btn blue" data-color="blue">Azul</button>
        <button class="color-btn yellow" data-color="yellow">Amarillo</button>
        <button class="color-btn reset" data-color="reset">Normal</button>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
